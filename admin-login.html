<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0d6efd,#00b894);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

#error{
    color:red;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Admin Login 🔐</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script>

function login(){

let username = document.getElementById("user").value;
let password = document.getElementById("pass").value;

// SIMPLE FIXED LOGIN (you can change it)
let adminUser = "admin";
let adminPass = "1234";

if(username === adminUser && password === adminPass){

// save login session
localStorage.setItem("adminLoggedIn", "true");

// go to admin panel
window.location.href = "orders.html";

}else{
document.getElementById("error").innerText = "Invalid login!";
}

}

</script>

</body>
</html>
