<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #ddd;
    padding:15px 0;
}

button{
    background:red;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.checkout{
    display:block;
    margin-top:20px;
    background:#00b894;
    color:white;
    text-align:center;
    padding:12px;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>🛒 My Cart</h2>
</header>

<div class="container">

<div id="cartItems"></div>

<h3 id="total">Total: ₹0</h3>

<a href="order.html" class="checkout">
Proceed to Checkout
</a>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html = "";
let total = 0;

cart.forEach((item,index)=>{

total += item.price * item.qty;

html += `
<div class="item">

<div>
<h3>${item.product}</h3>
<p>₹${item.price}</p>
</div>

<div style="display:flex;align-items:center;gap:10px;">

<button onclick="decreaseQty(${index})">➖</button>

<span>${item.qty}</span>

<button onclick="increaseQty(${index})">➕</button>

</div>

</div>
`;

});

if(cart.length==0){
html="<h2>Your Cart is Empty</h2>";
}

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerHTML="Total : ₹"+total;

function increaseQty(index){

    cart[index].qty++;

    localStorage.setItem("cart", JSON.stringify(cart));

    location.reload();
}

function decreaseQty(index){

    if(cart[index].qty > 1){

        cart[index].qty--;

    }else{

        cart.splice(index,1);

    }

    localStorage.setItem("cart", JSON.stringify(cart));

    location.reload();
}

</script>

</body>
</html>
