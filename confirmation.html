<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Confirmation</title>

<style>
body{
    font-family: Arial;
    background: #f2f2f2;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    text-align:center;
}

/* ✅ Circle animation */
.circle{
    width:120px;
    height:120px;
    border-radius:50%;
    border:6px solid #00b894;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:20px auto;
    animation: pop 0.6s ease;
}

/* ✔ Tick mark animation */
.checkmark{
    width:50px;
    height:100px;
    border-right:6px solid #00b894;
    border-bottom:6px solid #00b894;
    transform: rotate(45deg);
    animation: draw 0.5s ease forwards;
    opacity:0;
}

@keyframes draw{
    0%{
        opacity:0;
        transform: scale(0) rotate(45deg);
    }
    100%{
        opacity:1;
        transform: scale(1) rotate(45deg);
    }
}

@keyframes pop{
    0%{transform:scale(0);}
    100%{transform:scale(1);}
}

h1{
    color:green;
    margin-top:10px;
}

p{
    margin:5px 0;
}

button{
    margin-top:20px;
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="circle">
    <div class="checkmark"></div>
</div>

<h1>Order Placed Successfully 🎉</h1>

<div id="details"></div>

<button onclick="goHome()">Go to Home</button>

</div>

<script>

let order = JSON.parse(localStorage.getItem("orderData")) || {};

document.getElementById("details").innerHTML = `
    <p><b>Name:</b> ${order.name}</p>
    <p><b>Phone:</b> ${order.phone}</p>
    <p><b>Address:</b> ${order.address}</p>
    <hr>
    <p><b>Products:</b> ${order.products}</p>
    <p><b>Total:</b> ₹${order.total}</p>
`;

function goHome(){
    localStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
