<!DOCTYPE html>
<html>
<head>
<title>Order History</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.card{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📦 My Orders</h2>

<div id="list"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let html = "";

orders.reverse().forEach(o => {
html += `
<div class="card">
<h3>${o.product}</h3>
<p>Order ID: ${o.orderId}</p>
<p>Status: ${o.status}</p>
<p>Name: ${o.name}</p>
</div>
`;
});

document.getElementById("list").innerHTML =
orders.length ? html : "<h3>No orders yet</h3>";
</script>

</body>
</html>
