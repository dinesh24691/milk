<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
font-family:'Poppins',sans-serif;
background:#f5f8ff;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#00c853,#64dd17);
color:white;
font-weight:bold;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

.modal-box label{
display:block;
margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>Place Your Order</h2>

<label>Name</label>
<input type="text" id="name">

<label>Phone</label>
<input type="text" id="phone">

<label>Address</label>
<textarea id="address"></textarea>

<button onclick="openPayment()">Place Order</button>

</div>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="modal">
  <div class="modal-box">

    <h3>Select Payment Method</h3>

    <label><input type="radio" name="payment" value="gpay"> Google Pay</label>
    <label><input type="radio" name="payment" value="phonepe"> PhonePe</label>
    <label><input type="radio" name="payment" value="paytm"> Paytm</label>
    <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>

    <button onclick="confirmOrder()">Confirm Order</button>

  </div>
</div>

<script>

let upiID = "8688010847@upi"; // 🔴 YOUR PAYMENT ID

function openPayment(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

if(name=="" || phone=="" || address==""){
alert("Fill all details");
return;
}

document.getElementById("paymentModal").style.display = "flex";
}

function confirmOrder(){

let payment = document.querySelector('input[name="payment"]:checked');

if(!payment){
alert("Select payment method");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let orderId = "FD" + Math.floor(Math.random()*1000000);

// 👉 IF COD
if(payment.value === "cod"){
placeOrder(orderId, payment.value);
return;
}

// 👉 UPI PAYMENT (PhonePe / GPay / Paytm)
let upiURL = `upi://pay?pa=${upiID}&pn=FreshDairy&cu=INR`;

window.location.href = upiURL;

// AFTER 3 SEC ASSUME PAYMENT SUCCESS
setTimeout(()=>{
placeOrder(orderId, payment.value);
},3000);

}

function placeOrder(orderId, paymentType){

let order = {
id: orderId,
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
address: document.getElementById("address").value,
payment: paymentType,
status: "Confirmed",
date: new Date().toLocaleString()
};

let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(order);
localStorage.setItem("orders", JSON.stringify(orders));

localStorage.removeItem("cart");

alert("Order Confirmed 🚀");

window.location.href = "orders.html";
}

</script>

</body>
</html>
