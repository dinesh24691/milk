<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Orders Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    margin:0;
}

header{
    background:#0d6efd;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.container{
    width:95%;
    max-width:900px;
    margin:20px auto;
}

.order-card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.status{
    font-weight:bold;
    margin:10px 0;
}

button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.pack{background:#ffa502;color:white;}
.out{background:#1e90ff;color:white;}
.delivered{background:#2ed573;color:white;}
.cancel{background:#ff4757;color:white;}
</style>
</head>

<body>

<header>📦 Admin Order Panel</header>

<div class="container" id="ordersBox"></div>
if(localStorage.getItem("adminLoggedIn") !== "true"){
    alert("Please login first!");
    window.location.href = "admin-login.html";
}
<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function renderOrders(){

let box = document.getElementById("ordersBox");
box.innerHTML = "";

if(orders.length === 0){
box.innerHTML = "<h3>No Orders Found</h3>";
return;
}

orders.forEach((o,index)=>{

box.innerHTML += `
<div class="order-card">

<h3>${o.product}</h3>
<p>👤 ${o.name}</p>
<p>📞 ${o.phone}</p>
<p>📍 ${o.address}</p>
<p>🆔 ${o.orderId}</p>

<div class="status">Status: ${o.status}</div>

<button class="pack" onclick="updateStatus(${index},'Packed')">Packed</button>
<button class="out" onclick="updateStatus(${index},'Out for Delivery')">Out</button>
<button class="delivered" onclick="updateStatus(${index},'Delivered')">Delivered</button>
<button class="cancel" onclick="cancelOrder(${index})">Cancel</button>
<button onclick="logout()" style="float:right;background:red;color:white;border:none;padding:8px 12px;border-radius:6px;">
Logout
</button>
</div>
`;
});

}

function updateStatus(i,status){
orders[i].status = status;
localStorage.setItem("orders", JSON.stringify(orders));
renderOrders();
}

function cancelOrder(i){
orders.splice(i,1);
localStorage.setItem("orders", JSON.stringify(orders));
renderOrders();
}

renderOrders();

</script>

</body>
</html>
