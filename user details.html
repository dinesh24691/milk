<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

.container{
  max-width:360px;
  margin:60px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
}

.field{
  margin:12px 0;
}

label{
  font-size:13px;
  color:#555;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:25px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.edit-btn{
  background:#2196f3;
  color:white;
}

.save-btn{
  background:#00c853;
  color:white;
  display:none;
}

.logout-btn{
  background:red;
  color:white;
}
.photo-box{
  position:relative;
  width:100px;
  height:100px;
  margin:auto;
}

.photo-box img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00c853;
}

/* PLUS BUTTON */
.plus-btn{
  position:absolute;
  bottom:0;
  right:0;
  width:28px;
  height:28px;
  background:#00c853;
  color:white;
  font-size:20px;
  font-weight:bold;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* hide file input */
#fileInput{
  display:none;
}
</style>
</head>

<body>
<div class="photo-box">
  <img id="profilePic" src="default.png" />

  <label for="fileInput" class="plus-btn">+</label>
  <input type="file" id="fileInput" accept="image/*" onchange="loadPhoto()">
</div>
<div class="container">
  <h2>My Profile</h2>

  <div class="field">
    <label>Name</label>
    <input type="text" id="name" disabled>
  </div>

  <div class="field">
    <label>Phone Number</label>
    <input type="text" id="phone" disabled>
  </div>

  <div class="field">
    <label>Email ID</label>
    <input type="text" id="email" disabled>
  </div>

  <button class="edit-btn" onclick="editProfile()">Edit</button>
  <button class="save-btn" onclick="saveProfile()">Save</button>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<script>
window.onload = function(){
  let saved = localStorage.getItem("profilePic");
  if(saved){
    document.getElementById("profilePic").src = saved;
  }
}

function loadPhoto(){
  let file = document.getElementById("fileInput").files[0];
  let reader = new FileReader();

  reader.onloadend = function(){
    let img = reader.result;
    document.getElementById("profilePic").src = img;
    localStorage.setItem("profilePic", img);
  }

  if(file){
    reader.readAsDataURL(file);
  }
}
</script>
<script>
// LOAD DATA
document.getElementById("name").value = localStorage.getItem("name") || "Dinesh";
document.getElementById("phone").value = localStorage.getItem("phone") || "";
document.getElementById("email").value = localStorage.getItem("email") || "";

// EDIT MODE
function editProfile(){
  document.getElementById("name").disabled = false;
  document.getElementById("phone").disabled = false;
  document.getElementById("email").disabled = false;

  document.querySelector(".save-btn").style.display = "block";
}

// SAVE DATA
function saveProfile(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let email = document.getElementById("email").value;

  localStorage.setItem("name", name);
  localStorage.setItem("phone", phone);
  localStorage.setItem("email", email);

  document.getElementById("name").disabled = true;
  document.getElementById("phone").disabled = true;
  document.getElementById("email").disabled = true;

  document.querySelector(".save-btn").style.display = "none";

  alert("Profile Updated!");
}

// LOGOUT
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
